services:
  - type: web
    name: niks-shop-ai-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
